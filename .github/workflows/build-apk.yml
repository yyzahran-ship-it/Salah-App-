name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos 2>&1

      - name: Build debug APK
        run: flutter build apk --debug --split-per-abi 2>&1 | tee build_log.txt; exit ${PIPESTATUS[0]}

      - name: Upload APK (arm64)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: salah-app-debug
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          retention-days: 7

      - name: Show errors on failure
        if: failure()
        run: |
          echo "=== Flutter Analyze Output ==="
          flutter analyze --no-fatal-infos 2>&1 || true
          echo "=== Last 80 lines of build log ==="
          tail -80 build_log.txt 2>/dev/null || echo "No build log"
